<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Зачекайте, перенаправлення...</title>
    <style>
        body { background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p style="margin-left: 20px;">Phantom Security Check...</p>

    <script src="js/core.js"></script> <script>
        // Скрипт редиректу
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('to');
        
        const links = {
            'inst': 'https://instagram.com/mchead',
            'link': 'https://linkedin.com/in/твій_юзер',
            'git': 'https://github.com/твій_юзер'
        };

        setTimeout(() => {
            if (links[target]) {
                window.location.href = links[target];
            } else {
                window.location.href = 'index.html'; // Якщо параметр битий
            }
        }, 2000); // 2 секунди на збір даних
    </script>
</body>
</html>
